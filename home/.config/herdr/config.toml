onboarding = false
[keys]
prefix = "ctrl+a"
previous_tab = ""  # unset (unused) so prefix+p is free for the projects picker below
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"
next_agent       = "prefix+a"  # cycle to the next agent (prefix is ctrl+a, so: ctrl+a then a)
split_horizontal = "prefix+double_quote"
split_vertical   = "prefix+percent"
new_tab   = "prefix+c"
close_tab = "prefix+ampersand"
workspace_picker = "prefix+w"
goto             = "prefix+g"
open_worktree    = "prefix+shift+o"  # new_worktree is prefix+shift+g by default
remove_worktree  = "prefix+shift+r"  # deletes the checkout dir; keeps the branch; prompts if dirty
copy_mode  = "prefix+y"  # herdr's copy-mode entry key; copy-mode's own internal keys (v/space select, y/Enter copy, q/Esc cancel) aren't configurable

# herdr-plus projects picker (templates generated from herdr-plus.nix).
# prefix+p is freed by unsetting previous_tab above. Also invokable from the CLI:
#   herdr plugin action invoke cloudmanic.herdr-plus.projects
[[keys.command]]
key = "prefix+p"
type = "plugin_action"
command = "cloudmanic.herdr-plus.projects"
description = "herdr-plus: projects"

[theme.custom]
panel_bg = "transparent"  # let the translucent WezTerm background (wallpaper) show through the navbar and panel surfaces
surface0  = "#1e1e2e"     # inactive-tab pill background; matches the active workspace row (theme surface_dim). Re-tune this hex if the base theme changes (herdr config can't alias one token to another).

[ui]
agent_panel_sort = "spaces"

[ui.toast]
delivery = "off"

[theme]
name = "catppuccin"
auto_switch = false
